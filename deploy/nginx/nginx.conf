events {
    worker_connections 1024;
}

http {
    # Gateway gRPC upstream
    upstream gateway {
        server 127.0.0.1:9000;
    }

    server {
        listen 8443 http2;

        # gRPC edge — routes to Gateway
        location /gateway.v1.CompletionService/Complete {
            grpc_pass grpc://gateway;
            grpc_set_header X-Auth-Token $http_x_auth_token;
        }
    }
}
